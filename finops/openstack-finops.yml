specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: OpenStack
providerId: openstack
publisherName: OpenStack
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Cloud Platform
  - Infrastructure as a Service
  - Open Source
  - Virtualization
  - Linux Foundation
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the OpenStack API surface. Provides a FOCUS-aligned mapping
  for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: OpenStack
  ServiceCategory: Developer Tools / API
  ProviderName: OpenStack
  PublisherName: OpenStack
  InvoiceIssuerName: OpenStack
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: OpenStack Identity (Keystone) API
    baseURL: https://{keystone-host}:5000/v3
    tags:
      - Identity
      - Authentication
      - Authorization
      - Service Catalog
    serviceName: OpenStack Identity (Keystone) API
    serviceCategory: API
  - name: OpenStack Compute (Nova) API
    baseURL: https://{nova-host}/compute/v2.1
    tags:
      - Compute
      - Virtual Machines
      - Bare Metal
    serviceName: OpenStack Compute (Nova) API
    serviceCategory: API
  - name: OpenStack Networking (Neutron) API
    baseURL: https://{neutron-host}/networking/v2.0
    tags:
      - Networking
      - SDN
      - Security Groups
    serviceName: OpenStack Networking (Neutron) API
    serviceCategory: API
  - name: OpenStack Block Storage (Cinder) API
    baseURL: https://{cinder-host}/volume/v3
    tags:
      - Block Storage
      - Volumes
      - Snapshots
    serviceName: OpenStack Block Storage (Cinder) API
    serviceCategory: API
  - name: OpenStack Object Storage (Swift) API
    baseURL: https://{swift-host}/v1/AUTH_{tenant_id}
    tags:
      - Object Storage
      - Containers
      - Replication
    serviceName: OpenStack Object Storage (Swift) API
    serviceCategory: API
  - name: OpenStack Image (Glance) API
    baseURL: https://{glance-host}/image/v2
    tags:
      - Images
      - Disk Images
    serviceName: OpenStack Image (Glance) API
    serviceCategory: API
  - name: OpenStack Orchestration (Heat) API
    baseURL: https://{heat-host}/heat-api/v1
    tags:
      - Orchestration
      - Infrastructure as Code
    serviceName: OpenStack Orchestration (Heat) API
    serviceCategory: API
  - name: OpenStack Load Balancer (Octavia) API
    baseURL: https://{octavia-host}/load-balancer/v2
    tags:
      - Load Balancer
      - LBaaS
    serviceName: OpenStack Load Balancer (Octavia) API
    serviceCategory: API
  - name: OpenStack DNS (Designate) API
    baseURL: https://{designate-host}/dns/v2
    tags:
      - DNS
      - DNSaaS
    serviceName: OpenStack DNS (Designate) API
    serviceCategory: API
  - name: OpenStack Database (Trove) API
    baseURL: https://{trove-host}/database/v1.0
    tags:
      - Database
      - DBaaS
    serviceName: OpenStack Database (Trove) API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
