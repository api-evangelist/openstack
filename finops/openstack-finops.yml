specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: OpenStack
providerId: openstack
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Platform
  - Infrastructure as a Service
  - Open Source
  - FinOps
  - FOCUS
notes: OpenStack is open-source software; there is no upstream invoice. FinOps shape here describes private-cloud
  cost-of-running-OpenStack (capex + ops) and the meters operators commonly expose via Ceilometer / Gnocchi
  / chargeback systems. Public-cloud providers running OpenStack issue their own invoices, modeled separately.
description: 'FOCUS-aligned FinOps framing for self-hosted OpenStack: no upstream license fee; cost is
  driven by underlying hardware, power/cooling, and operator labor. Internal chargeback typically uses
  Ceilometer/Gnocchi metrics to bill tenants per-vCPU-hour, per-GB-month, and per-network-egress.'
sources:
  - https://www.openstack.org/
  - https://docs.openstack.org/ceilometer/latest/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Open Infrastructure Foundation
serviceCategory: Infrastructure / IaaS
billingModel:
  pricingCategory: Self-Hosted Open Source (operator chargeback)
  billingFrequency: Monthly (operator-defined)
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: OpenStack
  ServiceCategory: Infrastructure / IaaS
  ProviderName: OpenStack (operator-deployed)
  PublisherName: Open Infrastructure Foundation
  InvoiceIssuerName: N/A (operator chargeback)
  BillingCurrency: USD
meters:
  - name: vcpu_hours
    unit: vCPU-hour
    aggregation: sum
    dimensions:
      - tenant
      - flavor
      - region
  - name: memory_gb_hours
    unit: GB-hour
    aggregation: sum
    dimensions:
      - tenant
      - flavor
  - name: block_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - tenant
      - volume_type
  - name: object_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - tenant
      - container
  - name: network_egress
    unit: GB
    aggregation: sum
    dimensions:
      - tenant
      - region
  - name: floating_ip_hours
    unit: IP-hour
    aggregation: sum
    dimensions:
      - tenant
principles:
  - name: Visibility
    description: Use Ceilometer / Gnocchi (or a downstream telemetry stack like Monasca, Prometheus +
      ceilometer-publisher-prom) to expose per-tenant consumption to finance and engineering.
  - name: Allocation
    description: Tag projects/tenants with cost-center metadata; chargeback or showback per project using
      consumption events from Ceilometer.
  - name: Optimization
    description: Right-size flavors, use spot/preemptible-equivalent host aggregates, reclaim orphaned
      volumes and floating IPs, and consolidate idle workloads before adding hardware.
  - name: Accountability
    description: Platform/infra team owns operator cost; tenant teams own their project consumption with
      quotas and chargeback reports.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
