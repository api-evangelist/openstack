specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: OpenStack
providerId: openstack
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Platform
  - Infrastructure as a Service
  - Open Source
  - Virtualization
notes: OpenStack is open-source IaaS software distributed under Apache 2.0 by the Open Infrastructure
  Foundation. There is no upstream commercial pricing — costs are set by the operator (private cloud)
  or by downstream distributions / public-cloud providers (Red Hat, Canonical, OVHcloud, Rackspace, T-Systems,
  etc.). This artifact describes the upstream project; per-provider pricing is captured in those providers'
  own artifacts.
description: OpenStack is a free and open-source cloud-computing platform. The upstream project does not
  charge for software or APIs; commercial OpenStack offerings exist via downstream distributions and managed
  public clouds (Red Hat OpenStack Platform, Canonical Charmed OpenStack, OVHcloud Public Cloud, Rackspace,
  etc.).
sources:
  - https://www.openstack.org/
  - https://docs.openstack.org/
plans:
  - id: openstack-oss
    name: Upstream Open Source
    type: freemium
    description: OpenStack source code and APIs are free under Apache 2.0. Operators self-host and price
      consumption however they choose.
    entries:
      - label: Self-hosted usage
        name: self_hosted
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Compute (Nova)
      - name: Networking (Neutron)
      - name: Block Storage (Cinder)
      - name: Object Storage (Swift)
      - name: Identity (Keystone)
      - name: Image (Glance)
      - name: Orchestration (Heat)
      - name: Community support via mailing lists, IRC, Slack
maintainers:
