naftiko: 1.0.0-alpha2
info:
  label: OpenStack Identity (Keystone) API v3 — Groups
  description: 'OpenStack Identity (Keystone) API v3 — Groups. 2 operations. Lead operation: List groups. Self-contained Naftiko
    capability covering one Openstack business surface.'
  tags:
  - Openstack
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENSTACK_API_KEY: OPENSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: keystone-groups
    baseUri: https://{keystone-host}:5000/v3
    description: OpenStack Identity (Keystone) API v3 — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: listgroups
        method: GET
        description: List groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategroup
        method: POST
        description: Create group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.OPENSTACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: keystone-groups-rest
    port: 8080
    description: REST adapter for OpenStack Identity (Keystone) API v3 — Groups. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: listgroups
        description: List groups
        call: keystone-groups.listgroups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroup
        description: Create group
        call: keystone-groups.creategroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: keystone-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenStack Identity (Keystone) API v3 — Groups. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-groups
      description: List groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: keystone-groups.listgroups
      outputParameters:
      - type: object
        mapping: $.
    - name: create-group
      description: Create group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: keystone-groups.creategroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
