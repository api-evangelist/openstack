naftiko: 1.0.0-alpha2
info:
  label: OpenStack Identity (Keystone) API v3
  description: Keystone is the OpenStack Identity service that provides authentication, authorization, and a service catalog
    for an OpenStack cloud. Tokens issued by Keystone are required to call any other OpenStack service API. The v3 API exposes
    endpoints for tokens, users, groups, projects, domains, roles, role assignments, services, endpoints, and the service
    catalog.
  tags:
  - Openstack
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: openstack
    baseUri: https://keystone.example.com:5000/v3
    description: OpenStack Identity (Keystone) API v3 HTTP API.
    authentication:
      type: apikey
      in: header
      name: X-Auth-Token
      value: '{{OPENSTACK_TOKEN}}'
    resources:
    - name: auth-tokens
      path: /auth/tokens
      operations:
      - name: issuetoken
        method: POST
        description: Issue an authentication token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validatetoken
        method: GET
        description: Validate token
        inputParameters:
        - name: X-Subject-Token
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: revoketoken
        method: DELETE
        description: Revoke token
        inputParameters:
        - name: X-Subject-Token
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
