naftiko: 1.0.0-alpha2
info:
  label: OpenStack Identity (Keystone) API v3 — Domains
  description: 'OpenStack Identity (Keystone) API v3 — Domains. 2 operations. Lead operation: List domains. Self-contained
    Naftiko capability covering one Openstack business surface.'
  tags:
  - Openstack
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENSTACK_API_KEY: OPENSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: keystone-domains
    baseUri: https://{keystone-host}:5000/v3
    description: OpenStack Identity (Keystone) API v3 — Domains business capability. Self-contained, no shared references.
    resources:
    - name: domains
      path: /domains
      operations:
      - name: listdomains
        method: GET
        description: List domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdomain
        method: POST
        description: Create domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.OPENSTACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: keystone-domains-rest
    port: 8080
    description: REST adapter for OpenStack Identity (Keystone) API v3 — Domains. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/domains
      name: domains
      description: REST surface for domains.
      operations:
      - method: GET
        name: listdomains
        description: List domains
        call: keystone-domains.listdomains
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdomain
        description: Create domain
        call: keystone-domains.createdomain
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: keystone-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenStack Identity (Keystone) API v3 — Domains. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-domains
      description: List domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: keystone-domains.listdomains
      outputParameters:
      - type: object
        mapping: $.
    - name: create-domain
      description: Create domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: keystone-domains.createdomain
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
