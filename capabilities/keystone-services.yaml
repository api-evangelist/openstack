naftiko: 1.0.0-alpha2
info:
  label: OpenStack Identity (Keystone) API v3 — Services
  description: 'OpenStack Identity (Keystone) API v3 — Services. 2 operations. Lead operation: List services in catalog. Self-contained
    Naftiko capability covering one Openstack business surface.'
  tags:
  - Openstack
  - Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENSTACK_API_KEY: OPENSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: keystone-services
    baseUri: https://{keystone-host}:5000/v3
    description: OpenStack Identity (Keystone) API v3 — Services business capability. Self-contained, no shared references.
    resources:
    - name: services
      path: /services
      operations:
      - name: listservices
        method: GET
        description: List services in catalog
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createservice
        method: POST
        description: Create service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.OPENSTACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: keystone-services-rest
    port: 8080
    description: REST adapter for OpenStack Identity (Keystone) API v3 — Services. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/services
      name: services
      description: REST surface for services.
      operations:
      - method: GET
        name: listservices
        description: List services in catalog
        call: keystone-services.listservices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createservice
        description: Create service
        call: keystone-services.createservice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: keystone-services-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenStack Identity (Keystone) API v3 — Services. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-services-catalog
      description: List services in catalog
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: keystone-services.listservices
      outputParameters:
      - type: object
        mapping: $.
    - name: create-service
      description: Create service
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: keystone-services.createservice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
