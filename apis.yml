aid: openstack
name: OpenStack
description: >-
  Open source cloud computing platform for building and managing public and
  private clouds, providing infrastructure as a service (IaaS) through a set
  of interrelated services including Compute (Nova), Object Storage (Swift),
  Block Storage (Cinder), Networking (Neutron), and Identity (Keystone).
